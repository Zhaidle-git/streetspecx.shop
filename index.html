<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STREETSPECX</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" mage/href="home.css" />

    <!-- Font Awesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- ===== HEADER ===== -->
    <header>
      <nav class="navbar">
        <div class="nav-logo">StreetSpecX</div>

        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li>
            <a href="login.html"><button class="login-btn">Login</button></a>
          </li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </header>

    <!-- ===== MAIN ===== -->
    <main>
      <div class="hero-text">
        <h2 class="tag">
          Confidence hits <br />different in the<br />right fit.
        </h2>
        <h4 class="sentence">
          Built for the streets, designed for confidence, made to stand out
          without compromise anywhere.
        </h4>
        <a href="login.html"><button class="started">Get Started</button></a>
      </div>

      <div class="logo">
        <img src="logo.png" alt="StreetSpecX logo" />
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
      <h3>StreetSpecX</h3>
      <p>Stay connected with us</p>

      <div class="socials">
        <a href="#" class="icon facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="icon instagram"><i class="fab fa-instagram"></i></a>
        <a href="mailto:your@email.com" class="icon gmail"
          ><i class="fas fa-envelope"></i
        ></a>
        <a href="#" class="icon x"><i class="fab fa-x-twitter"></i></a>
      </div>

      <p class="copyright">© 2026 StreetSpecX. All rights reserved.</p>
    </footer>

    <script>
      // Hamburger toggle
      const toggle = document.getElementById("menuToggle");
      const nav = document.getElementById("navLinks");

      toggle.addEventListener("click", () => {
        nav.classList.toggle("active");
      });

      // Social icons scroll reveal
      const socials = document.querySelector(".socials");

      function revealSocials() {
        const trigger = window.innerHeight * 0.8;
        const top = socials.getBoundingClientRect().top;

        if (top < trigger) {
          socials.classList.add("show");
        }
      }
      window.addEventListener("scroll", revealSocials);
      // trigger on page load in case footer visible
      revealSocials();
    </script>
  </body>
</html>
